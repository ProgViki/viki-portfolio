<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg1)"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007ACC" />
      <stop offset="100%" style="stop-color:#10B981" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d44;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#007ACC" opacity="0.1"/>
  <circle cx="700" cy="500" r="250" fill="#10B981" opacity="0.1"/>
  <circle cx="400" cy="300" r="300" fill="#007ACC" opacity="0.05"/>

  <!-- Dashboard Grid -->
  <g transform="translate(50, 50)">
    <!-- Sidebar -->
    <rect x="0" y="0" width="60" height="500" rx="12" fill="#2d2d44" opacity="0.8"/>
    <rect x="15" y="20" width="30" height="30" rx="8" fill="url(#blueGrad)"/>
    <circle cx="30" cy="80" r="10" fill="#4a4a6a"/>
    <circle cx="30" cy="120" r="10" fill="#4a4a6a"/>
    <circle cx="30" cy="160" r="10" fill="#4a4a6a"/>
    <circle cx="30" cy="200" r="10" fill="#007ACC"/>
    <circle cx="30" cy="240" r="10" fill="#4a4a6a"/>
    <circle cx="30" cy="280" r="10" fill="#4a4a6a"/>
    
    <!-- Main Content -->
    <rect x="80" y="0" width="620" height="100" rx="12" fill="url(#cardGrad)"/>
    <rect x="100" y="20" width="200" height="20" rx="6" fill="#4a4a6a"/>
    <rect x="100" y="50" width="300" height="15" rx="4" fill="#3a3a5a"/>
    
    <!-- Stats Cards -->
    <rect x="80" y="120" width="190" height="100" rx="12" fill="url(#cardGrad)"/>
    <rect x="100" y="140" width="80" height="15" rx="4" fill="#4a4a6a"/>
    <rect x="100" y="165" width="120" height="30" rx="6" fill="#007ACC" opacity="0.3"/>
    
    <rect x="290" y="120" width="190" height="100" rx="12" fill="url(#cardGrad)"/>
    <rect x="310" y="140" width="80" height="15" rx="4" fill="#4a4a6a"/>
    <rect x="310" y="165" width="120" height="30" rx="6" fill="#10B981" opacity="0.3"/>
    
    <rect x="500" y="120" width="200" height="100" rx="12" fill="url(#cardGrad)"/>
    <rect x="520" y="140" width="80" height="15" rx="4" fill="#4a4a6a"/>
    <rect x="520" y="165" width="120" height="30" rx="6" fill="#007ACC" opacity="0.3"/>
    
    <!-- Table -->
    <rect x="80" y="240" width="620" height="250" rx="12" fill="url(#cardGrad)"/>
    <rect x="100" y="260" width="580" height="30" rx="6" fill="#3a3a5a" opacity="0.5"/>
    <rect x="100" y="300" width="580" height="20" rx="4" fill="#2d2d44"/>
    <rect x="100" y="330" width="580" height="20" rx="4" fill="#2d2d44"/>
    <rect x="100" y="360" width="580" height="20" rx="4" fill="#2d2d44"/>
    <rect x="100" y="390" width="580" height="20" rx="4" fill="#2d2d44"/>
    <rect x="100" y="420" width="580" height="20" rx="4" fill="#2d2d44"/>
    
    <!-- Badges -->
    <rect x="550" y="20" width="120" height="25" rx="12" fill="#007ACC" opacity="0.2"/>
    <text x="560" y="37" fill="#007ACC" font-size="10" font-family="Arial">Enterprise HR</text>
  </g>

  <!-- Title -->
  <text x="400" y="580" fill="#ffffff" font-size="20" font-family="Arial" font-weight="bold" text-anchor="middle" opacity="0.8">Enterprise HR Platform</text>
</svg>