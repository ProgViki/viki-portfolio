<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007ACC" />
      <stop offset="100%" style="stop-color:#10B981" />
    </linearGradient>
    <linearGradient id="cardGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="healthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981" />
      <stop offset="100%" style="stop-color:#007ACC" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg4)"/>
  
  <!-- Glowing Orbs -->
  <circle cx="100" cy="100" r="180" fill="#10B981" opacity="0.06"/>
  <circle cx="700" cy="500" r="200" fill="#007ACC" opacity="0.06"/>
  <circle cx="400" cy="300" r="250" fill="#10B981" opacity="0.04"/>

  <!-- Medical AI Dashboard -->
  <g transform="translate(30, 30)">
    <!-- Main Container -->
    <rect x="0" y="0" width="740" height="520" rx="24" fill="url(#cardGrad4)"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="740" height="60" rx="24" fill="url(#blueGrad4)" opacity="0.15"/>
    <text x="30" y="38" fill="#ffffff" font-size="18" font-family="Arial" font-weight="bold">Healthcare AI Diagnostic System</text>
    <circle cx="700" cy="30" r="10" fill="#10B981" opacity="0.6"/>
    <circle cx="700" cy="30" r="6" fill="#10B981">
      <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Medical Scan Display -->
    <rect x="20" y="80" width="340" height="300" rx="16" fill="#0d0d2a" border="1" stroke="#1a3a5a" stroke-width="1"/>
    
    <!-- Brain Scan Visualization -->
    <g transform="translate(190, 230)">
      <!-- Brain outline -->
      <ellipse cx="0" cy="0" rx="80" ry="100" fill="none" stroke="#007ACC" stroke-width="1.5" opacity="0.4"/>
      <ellipse cx="0" cy="0" rx="60" ry="80" fill="none" stroke="#10B981" stroke-width="1" opacity="0.3"/>
      
      <!-- Brain activity dots -->
      <circle cx="-30" cy="-40" r="5" fill="#10B981" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="25" cy="-50" r="4" fill="#007ACC" opacity="0.7">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-10" cy="20" r="6" fill="#10B981" opacity="0.9">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="30" r="4" fill="#007ACC" opacity="0.6">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-50" cy="0" r="3" fill="#10B981" opacity="0.7">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="-60" r="4" fill="#007ACC" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Activity lines -->
      <line x1="-30" y1="-40" x2="25" y2="-50" stroke="#10B981" stroke-width="1" opacity="0.3"/>
      <line x1="25" y1="-50" x2="-10" y2="20" stroke="#007ACC" stroke-width="1" opacity="0.3"/>
      <line x1="-10" y1="20" x2="40" y2="30" stroke="#10B981" stroke-width="1" opacity="0.3"/>
      <line x1="40" y1="30" x2="-50" y2="0" stroke="#007ACC" stroke-width="1" opacity="0.3"/>
      
      <!-- Pulsing center -->
      <circle cx="0" cy="0" r="3" fill="#10B981">
        <animate attributeName="r" values="2;8;2" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Scan label -->
    <rect x="40" y="350" width="120" height="20" rx="4" fill="#007ACC" opacity="0.2"/>
    <text x="48" y="364" fill="#60A5FA" font-size="10" font-family="Arial">Active Scan: 47%</text>
    
    <!-- Diagnosis Results -->
    <rect x="380" y="80" width="340" height="160" rx="16" fill="#0d0d2a"/>
    <text x="400" y="110" fill="#93C5FD" font-size="14" font-family="Arial" font-weight="bold">Diagnosis Results</text>
    
    <!-- Result indicators -->
    <rect x="400" y="130" width="300" height="25" rx="6" fill="#10B981" opacity="0.15"/>
    <rect x="400" y="130" width="260" height="25" rx="6" fill="#10B981" opacity="0.3"/>
    <text x="410" y="147" fill="#10B981" font-size="11" font-family="Arial">Normal: 87%</text>
    
    <rect x="400" y="165" width="300" height="25" rx="6" fill="#F59E0B" opacity="0.15"/>
    <rect x="400" y="165" width="60" height="25" rx="6" fill="#F59E0B" opacity="0.3"/>
    <text x="410" y="182" fill="#FBBF24" font-size="11" font-family="Arial">Anomaly: 8%</text>
    
    <rect x="400" y="200" width="300" height="25" rx="6" fill="#EF4444" opacity="0.15"/>
    <rect x="400" y="200" width="30" height="25" rx="6" fill="#EF4444" opacity="0.3"/>
    <text x="410" y="217" fill="#F87171" font-size="11" font-family="Arial">High Risk: 5%</text>
    
    <!-- AI Confidence -->
    <rect x="380" y="260" width="340" height="100" rx="16" fill="#0d0d2a"/>
    <text x="400" y="290" fill="#93C5FD" font-size="14" font-family="Arial" font-weight="bold">AI Confidence Score</text>
    
    <!-- Confidence Circle -->
    <circle cx="550" cy="310" r="35" fill="none" stroke="#10B981" stroke-width="4" opacity="0.2"/>
    <circle cx="550" cy="310" r="35" fill="none" stroke="#10B981" stroke-width="4" stroke-dasharray="180" stroke-dashoffset="15">
      <animate attributeName="stroke-dashoffset" values="180;15" dur="2s" fill="freeze"/>
    </circle>
    <text x="550" y="316" fill="#10B981" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle">95%</text>
    
    <!-- Metrics Grid -->
    <g transform="translate(380, 380)">
      <rect x="0" y="0" width="160" height="60" rx="12" fill="#0d0d2a"/>
      <text x="15" y="22" fill="#6a6a8a" font-size="10" font-family="Arial">Accuracy Rate</text>
      <text x="15" y="45" fill="#10B981" font-size="18" font-family="Arial" font-weight="bold">95.2%</text>
      
      <rect x="175" y="0" width="160" height="60" rx="12" fill="#0d0d2a"/>
      <text x="190" y="22" fill="#6a6a8a" font-size="10" font-family="Arial">Daily Scans</text>
      <text x="190" y="45" fill="#007ACC" font-size="18" font-family="Arial" font-weight="bold">300+</text>
    </g>
    
    <!-- Bottom Stats -->
    <g transform="translate(20, 400)">
      <!-- Stat 1 -->
      <rect x="0" y="0" width="230" height="50" rx="12" fill="#0d0d2a"/>
      <text x="15" y="20" fill="#6a6a8a" font-size="10" font-family="Arial">Processing Time</text>
      <text x="15" y="40" fill="#10B981" font-size="16" font-family="Arial" font-weight="bold">2.3s avg</text>
      
      <!-- Stat 2 -->
      <rect x="245" y="0" width="230" height="50" rx="12" fill="#0d0d2a"/>
      <text x="260" y="20" fill="#6a6a8a" font-size="10" font-family="Arial">Model Version</text>
      <text x="260" y="40" fill="#007ACC" font-size="16" font-family="Arial" font-weight="bold">v3.2.1</text>
      
      <!-- Stat 3 -->
      <rect x="490" y="0" width="230" height="50" rx="12" fill="#0d0d2a"/>
      <text x="505" y="20" fill="#6a6a8a" font-size="10" font-family="Arial">Success Rate</text>
      <text x="505" y="40" fill="#10B981" font-size="16" font-family="Arial" font-weight="bold">98.7%</text>
    </g>
  </g>

  <!-- Title -->
  <text x="400" y="580" fill="#ffffff" font-size="20" font-family="Arial" font-weight="bold" text-anchor="middle" opacity="0.8">Healthcare AI Diagnostic System</text>
</svg>