<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007ACC" />
      <stop offset="100%" style="stop-color:#10B981" />
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg2)"/>
  
  <!-- Decorative -->
  <circle cx="150" cy="150" r="180" fill="#007ACC" opacity="0.08"/>
  <circle cx="650" cy="450" r="200" fill="#10B981" opacity="0.08"/>

  <!-- Property Grid -->
  <g transform="translate(40, 40)">
    <!-- Property Card 1 -->
    <rect x="0" y="0" width="340" height="250" rx="16" fill="url(#cardGrad2)"/>
    <rect x="20" y="20" width="300" height="140" rx="8" fill="#2d3a4a"/>
    <rect x="20" y="20" width="300" height="140" rx="8" fill="url(#blueGrad2)" opacity="0.1"/>
    <text x="50" y="100" fill="#007ACC" font-size="40" font-family="Arial">🏠</text>
    <rect x="20" y="175" width="200" height="15" rx="4" fill="#4a5a6a"/>
    <rect x="20" y="198" width="150" height="12" rx="4" fill="#3a4a5a"/>
    <rect x="20" y="220" width="80" height="20" rx="6" fill="#007ACC" opacity="0.3"/>
    <rect x="110" y="220" width="80" height="20" rx="6" fill="#10B981" opacity="0.3"/>

    <!-- Property Card 2 -->
    <rect x="370" y="0" width="340" height="250" rx="16" fill="url(#cardGrad2)"/>
    <rect x="390" y="20" width="300" height="140" rx="8" fill="#2d3a4a"/>
    <rect x="390" y="20" width="300" height="140" rx="8" fill="url(#blueGrad2)" opacity="0.1"/>
    <text x="420" y="100" fill="#10B981" font-size="40" font-family="Arial">🏢</text>
    <rect x="390" y="175" width="200" height="15" rx="4" fill="#4a5a6a"/>
    <rect x="390" y="198" width="150" height="12" rx="4" fill="#3a4a5a"/>
    <rect x="390" y="220" width="80" height="20" rx="6" fill="#007ACC" opacity="0.3"/>
    <rect x="480" y="220" width="80" height="20" rx="6" fill="#10B981" opacity="0.3"/>

    <!-- Property Card 3 -->
    <rect x="0" y="280" width="340" height="250" rx="16" fill="url(#cardGrad2)"/>
    <rect x="20" y="300" width="300" height="140" rx="8" fill="#2d3a4a"/>
    <rect x="20" y="300" width="300" height="140" rx="8" fill="url(#blueGrad2)" opacity="0.1"/>
    <text x="50" y="380" fill="#007ACC" font-size="40" font-family="Arial">🏘️</text>
    <rect x="20" y="455" width="200" height="15" rx="4" fill="#4a5a6a"/>
    <rect x="20" y="478" width="150" height="12" rx="4" fill="#3a4a5a"/>
    <rect x="20" y="500" width="80" height="20" rx="6" fill="#007ACC" opacity="0.3"/>
    <rect x="110" y="500" width="80" height="20" rx="6" fill="#10B981" opacity="0.3"/>

    <!-- Property Card 4 -->
    <rect x="370" y="280" width="340" height="250" rx="16" fill="url(#cardGrad2)"/>
    <rect x="390" y="300" width="300" height="140" rx="8" fill="#2d3a4a"/>
    <rect x="390" y="300" width="300" height="140" rx="8" fill="url(#blueGrad2)" opacity="0.1"/>
    <text x="420" y="380" fill="#10B981" font-size="40" font-family="Arial">🌆</text>
    <rect x="390" y="455" width="200" height="15" rx="4" fill="#4a5a6a"/>
    <rect x="390" y="478" width="150" height="12" rx="4" fill="#3a4a5a"/>
    <rect x="390" y="500" width="80" height="20" rx="6" fill="#007ACC" opacity="0.3"/>
    <rect x="480" y="500" width="80" height="20" rx="6" fill="#10B981" opacity="0.3"/>
  </g>

  <text x="400" y="580" fill="#ffffff" font-size="20" font-family="Arial" font-weight="bold" text-anchor="middle" opacity="0.8">Real Estate Marketplace</text>
</svg>